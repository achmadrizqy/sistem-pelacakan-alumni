<!DOCTYPE html>
<html>
<head>
<title>Data Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">
	<div class="card shadow p-4 mb-4">
		<h2 class="mb-4 text-center">Kelola Data Alumni</h2>
		<form method="POST" class="mb-4">
			<div class="mb-3">
				<label class="form-label">Nama Alumni</label>
				<input type="text" name="nama" class="form-control" required>
			</div>
			<div class="mb-3">
				<label class="form-label">Tahun Lulus</label>
				<input type="text" name="tahun" class="form-control" required>
			</div>
			<div class="mb-3">
				<label class="form-label">Program Studi</label>
				<input type="text" name="prodi" class="form-control" required>
			</div>
			<button type="submit" class="btn btn-primary">Tambah Alumni</button>
		</form>
		<hr>
		<h3 class="mb-3">Daftar Alumni</h3>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th>Nama</th>
					<th>Tahun</th>
					<th>Prodi</th>
				</tr>
			</thead>
			<tbody>
				{% for a in alumni %}
				<tr>
					<td>{{a.nama}}</td>
					<td>{{a.tahun}}</td>
					<td>{{a.prodi}}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
		<div class="d-flex justify-content-end mt-3">
			<a href="/" class="btn btn-secondary">Kembali ke Dashboard</a>
		</div>
	</div>
</div>

<!-- ...existing code... -->

</body>
</html>
