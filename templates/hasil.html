<!DOCTYPE html>
<html>
<head>

<title>Hasil Pelacakan Alumni</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">
	<div class="card shadow p-4 mb-4">
		<h2 class="mb-4 text-center">Hasil Pelacakan Alumni</h2>
		<table class="table table-striped table-bordered">
			<thead class="table-dark">
				<tr>
					<th>Nama</th>
					<th>Pekerjaan</th>
					<th>Instansi</th>
					<th>Confidence</th>
					<th>Status</th>
					<th>Sumber</th>
				</tr>
			</thead>
			<tbody>
				{% for h in hasil %}
				<tr>
					<td>{{h.nama}}</td>
					<td>{{h.pekerjaan}}</td>
					<td>{{h.instansi}}</td>
					<td>{{h.confidence}}</td>
					<td>{{h.status}}</td>
					<td>{{h.sumber}}</td>
				</tr>
				{% endfor %}
			</tbody>
		</table>
		<div class="d-flex justify-content-end mt-3">
			<a href="/" class="btn btn-secondary">Kembali ke Dashboard</a>
		</div>
	</div>
</div>

</body>
</html>
